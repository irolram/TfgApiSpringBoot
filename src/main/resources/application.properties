spring.application.name=TfgApiSpringBoot


# Configuraciˇn de la Base de Datos (Railway)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# JPA / Hibernate
# 'update' crea las tablas automßticamente en MySQL basßndose en tus clases de Kotlin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto de la API (opcional, Railway suele usar el 8080 por defecto)
server.port=8080